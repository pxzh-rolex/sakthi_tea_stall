<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAKTHI TEA STALL</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f2;
      color: #2f2f2f;
    }
    header {
      background: #7b3d00;
      color: white;
      text-align: center;
      padding: 1.2rem 1rem;
      box-shadow: 0 4px 10px rgba(0,0,0,.2);
    }
    header h1 {
      margin: 0;
      font-size: 2.2rem;
      letter-spacing: 0.08rem;
    }
    header p {
      margin: 0.2rem 0 0;
      font-size: 1rem;
      opacity: .9;
    }
    main {
      max-width: 1080px;
      margin: 1.2rem auto;
      padding: 0 1rem;
    }
    .menu-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .item-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      border: 1px solid #dedede;
    }
    .item-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }
    .item-content {
      padding: 0.85rem;
    }
    .item-content h3 {
      margin: 0;
      font-size: 1.2rem;
    }
    .item-content .price {
      margin-top: 0.5rem;
      font-size: 1rem;
      font-weight: bold;
      color: #b9320a;
    }
    footer {
      text-align: center;
      font-size: 0.92rem;
      opacity: .8;
      margin: 2rem 0 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>SAKTHI TEA STALL</h1>
    <p>Hot drinks, cold vibes — every item ₹20 only</p>
  </header>

  <main>
    <section class="menu-grid">
      <article class="item-card">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=80" alt="Tea">
        <div class="item-content">
          <h3>Tea</h3>
          <div class="price">₹20</div>
        </div>
      </article>

      <article class="item-card">
        <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&w=800&q=80" alt="Coffee">
        <div class="item-content">
          <h3>Coffee</h3>
          <div class="price">₹20</div>
        </div>
      </article>

      <article class="item-card">
        <img src="https://images.unsplash.com/photo-1534350987454-dcdff7f3289a?auto=format&fit=crop&w=800&q=80" alt="Boost">
        <div class="item-content">
          <h3>Boost</h3>
          <div class="price">₹20</div>
        </div>
      </article>

      <article class="item-card">
        <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061?auto=format&fit=crop&w=800&q=80" alt="Intement">
        <div class="item-content">
          <h3>Intement</h3>
          <div class="price">₹20</div>
        </div>
      </article>

      <article class="item-card">
        <img src="https://images.unsplash.com/photo-1523986351871-2e3d80f6f22e?auto=format&fit=crop&w=800&q=80" alt="Sesor">
        <div class="item-content">
          <h3>Sesor</h3>
          <div class="price">₹20</div>
        </div>
      </article>

      <article class="item-card">
        <img src="https://images.unsplash.com/photo-1522337660859-02fbefca4702?auto=format&fit=crop&w=800&q=80" alt="Gold Filter">
        <div class="item-content">
          <h3>Gold Filter</h3>
          <div class="price">₹20</div>
        </div>
      </article>
    </section>
  </main>

  <footer>
    Every drink ₹20 • “SAKTHI TEA STALL” • Fresh & fast
  </footer>
</body>
</html>
